# ============================================
# AstroHub Backend — Docker Compose (Development)
# ============================================

services:
  db:
    image: postgres:16-alpine
    container_name: astrohub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: astrohub
      POSTGRES_PASSWORD: astrohub_dev
      POSTGRES_DB: astrohub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
